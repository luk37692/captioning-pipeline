name: tounum

services:
  # Réseau privé Tailscale (sidecar)
  # tailscale:
  #   image: tailscale/tailscale:latest
  #   container_name: tounum_ts
  #   hostname: ${TS_HOSTNAME:-tounum}
  #   restart: unless-stopped
  #   cap_add:
  #     - NET_ADMIN
  #   devices:
  #     - /dev/net/tun:/dev/net/tun
  #   environment:
  #     TS_AUTHKEY: ${TS_AUTHKEY:-}
  #     TS_HOSTNAME: ${TS_HOSTNAME:-tounum}
  #     TS_STATE_DIR: /var/lib/tailscale
  #     TS_EXTRA_ARGS: --accept-dns=false
  #   volumes:
  #     - ts_state:/var/lib/tailscale

  # Application (FastAPI + modèles GPU)
  app:
    build: .
    image: tounum-app:compose
    container_name: tounum_app
    restart: unless-stopped
    # depends_on:
    #   - tailscale
    # network_mode: service:tailscale        # accès via le nœud Tailscale (privé)
    ports:
      - "8000:8000"                          # accès direct (tailscale sidecar désactivé)
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "${RENDER_GID}"
      - "${VIDEO_GID}"
    security_opt:
      - seccomp:unconfined
    ipc: host
    environment:
      TOUNUM_CPU: ${TOUNUM_CPU:-0}          # 1 = force CPU (masque le GPU avant TF)
      # Modèles : TOUS embarqués dans l'image (src/assets -> /app/assets). Aucun
      # chemin de modèle externe ; le choix du captioning se fait depuis l'UI.
    volumes:
      # DEV : code monté depuis l'hôte -> pas de rebuild pour un changement de code.
      # `docker compose restart app` suffit. (Les volumes nommés ci-dessous se
      # montent PAR-DESSUS, donc runtime/cache ne sont pas masqués par le bind.)
      - ./src:/app                          # code live (override le COPY de l'image)
      - app_runtime:/app/runtime           # sessions, sorties débruitées
      - keras_cache:/root/.keras           # backbones ImageNet (téléchargés une fois)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 150s

  # Outils hors-service : entraînement / diagnostics (profil "tools")
  # Lancer à la demande :  docker compose --profile tools run --rm trainer
  trainer:
    build: .
    image: tounum-app:compose
    profiles: ["tools"]
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "${RENDER_GID}"
      - "${VIDEO_GID}"
    security_opt:
      - seccomp:unconfined
    ipc: host
    volumes:
      - ${DATASET_DIR}:/tf/notebooks
      - app_runtime:/app/runtime
      - keras_cache:/root/.keras
    command: ["python", "tools/smoke_test.py"]

volumes:
  ts_state:
    external: true
    name: tounum_ts_state
  app_runtime:
  keras_cache:
